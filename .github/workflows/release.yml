name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set explicit project version from tag
        run: printf '%s\n' "${GITHUB_REF_NAME}" > version.txt

      - name: Build app artifacts
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: esp32c6
          path: "."
          command: |
            idf.py set-target esp32c6 build -D CCACHE_ENABLE=1

      - name: Collect firmware outputs
        run: |
          set -euxo pipefail
          mkdir -p dist
          cp build/blinky_c6.bin dist/
          cp build/blinky_c6.elf dist/
          cp build/bootloader/bootloader.bin dist/
          cp build/partition_table/partition-table.bin dist/
          cp build/flasher_args.json dist/
          if [ -f build/blinky_c6.map ]; then
            cp build/blinky_c6.map dist/
          fi
          (cd dist && sha256sum * > sha256sums.txt)

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: dist

      - name: Determine release channel
        id: channel
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-rc."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.channel.outputs.prerelease }}
          files: |
            dist/*
