name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

jobs:
  app-build:
    name: App Build (ESP-IDF)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build app
        uses: espressif/esp-idf-ci-action@v1
        with:
          target: esp32c6
          path: "."
          command: |
            idf.py set-target esp32c6
            idf.py -D CCACHE_ENABLE=1 build
